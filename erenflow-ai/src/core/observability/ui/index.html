<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ErenFlowAI Trace Viewer</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --success: #22c55e;
      --error: #ef4444;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    body {
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1.5rem;
      min-height: 100vh;
    }
    h1 { font-size: 1.5rem; margin: 0 0 1rem 0; color: var(--accent); }
    .trace-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .trace-id { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }
    .trace-status { font-weight: 600; margin-bottom: 0.75rem; }
    .trace-status.ok { color: var(--success); }
    .trace-status.failed { color: var(--error); }
    .metrics { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .metric { background: var(--bg); padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.9rem; }
    .metric span { color: var(--muted); font-size: 0.75rem; }
    .path { display: flex; flex-wrap: wrap; gap: 0.25rem; align-items: center; margin-top: 0.75rem; }
    .path-node {
      background: var(--border);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.85rem;
    }
    .path-node.executed { background: var(--success); color: var(--bg); }
    .path-arrow { color: var(--muted); font-size: 0.8rem; }
    .node-timings { margin-top: 1rem; }
    .node-timings h3 { font-size: 0.9rem; margin-bottom: 0.5rem; color: var(--muted); }
    .timing-row { display: flex; justify-content: space-between; padding: 0.25rem 0; font-size: 0.85rem; }
    .timing-row span:last-child { color: var(--accent); }
  </style>
</head>
<body>
  <h1>ErenFlowAI Trace Viewer</h1>
  <div id="traces"></div>
  <script>
    fetch('/api/traces')
      .then(r => r.json())
      .then(traces => {
        const el = document.getElementById('traces');
        if (!traces || traces.length === 0) {
          el.innerHTML = '<p style="color: var(--muted);">No traces loaded.</p>';
          return;
        }
        traces.forEach((t, i) => {
          const card = document.createElement('div');
          card.className = 'trace-card';
          const status = t.status?.Failed ? 'failed' : 'ok';
          const statusText = t.status?.Failed
            ? `Failed at ${t.status.Failed.node}: ${t.status.Failed.error}`
            : 'Completed';
          const duration = t.end_time && t.start_time
            ? ((new Date(t.end_time) - new Date(t.start_time)) / 1000).toFixed(2) + 's'
            : '-';
          const tokens = t.token_usage ? t.token_usage.total_tokens || 0 : 0;
          const path = t.node_timings?.map(n => n.node_name) || [];
          card.innerHTML = `
            <div class="trace-id">${t.trace_id}${t.agent_name ? ' • ' + t.agent_name : ''}</div>
            <div class="trace-status ${status}">${statusText}</div>
            <div class="metrics">
              <div class="metric"><span>Duration</span><br>${duration}</div>
              <div class="metric"><span>Nodes</span><br>${t.node_timings?.length || 0}</div>
              <div class="metric"><span>Tokens</span><br>${tokens}</div>
            </div>
            <div class="path">
              START
              ${(path || []).map(n => `<span class="path-arrow">→</span><span class="path-node executed">${n}</span>`).join('')}
              <span class="path-arrow">→</span><span class="path-node">END</span>
            </div>
            <div class="node-timings">
              <h3>Node timings</h3>
              ${(t.node_timings || []).map(n => `
                <div class="timing-row">
                  <span>${n.node_name}</span>
                  <span>${n.duration_ms}ms</span>
                </div>
              `).join('')}
            </div>
          `;
          el.appendChild(card);
        });
      })
      .catch(e => {
        document.getElementById('traces').innerHTML =
          '<p style="color: var(--error);">Failed to load traces: ' + e.message + '</p>';
      });
  </script>
</body>
</html>
