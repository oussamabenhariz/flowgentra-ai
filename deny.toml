# cargo-deny configuration — supply-chain gates for CI.
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Fail CI on any advisory with a fix available; warn otherwise.
version = 2
yanked = "deny"
ignore = [
    # ttf-parser is unmaintained; pulled transitively by lopdf 0.42 (itself the
    # RUSTSEC-2026-0187 fix) via pdf-extract 0.12. No fixed path exists yet —
    # revisit when lopdf swaps font parsers.
    "RUSTSEC-2026-0192",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    # Public-domain dedication (constant_time_eq via zip).
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
