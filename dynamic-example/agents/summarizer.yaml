name: "summarizer_agent"
description: "Sub-agent that condenses analysis into a final summary"
llm:
  provider: mistral
  model: mistral-small-latest
  api_key: ${MISTRAL_API_KEY}
graph:
  nodes:
    - name: summarize
      handler: summarize
  edges:
    - from: START
      to: summarize
    - from: summarize
      to: END
