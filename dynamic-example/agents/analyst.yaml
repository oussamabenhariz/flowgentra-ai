name: "analyst_agent"
description: "Analyzes the gathered raw data"
llm:
  provider: mistral
  model: mistral-small-latest
  api_key: ${MISTRAL_API_KEY}
graph:
  nodes:
    - name: analyze_data
      handler: analyze_data
  edges:
    - from: START
      to: analyze_data
    - from: analyze_data
      to: END
