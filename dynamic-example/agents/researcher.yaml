name: "researcher_agent"
description: "Collects raw information about the topic"
llm:
  provider: mistral
  model: mistral-small-latest
  api_key: ${MISTRAL_API_KEY}
graph:
  nodes:
    - name: gather_data
      handler: gather_data
  edges:
    - from: START
      to: gather_data
    - from: gather_data
      to: END
