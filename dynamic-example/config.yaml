# Dynamic (LLM-driven) Strategy Example
# The supervisor asks an LLM at runtime which agents to call next.
# The LLM sees the current state and available agents, then returns
# a JSON array of agent names to execute.

name: "dynamic_pipeline"
description: "Dynamic supervisor demo — LLM decides execution order"

llm:
  provider: mistral
  model: mistral-large-latest
  api_key: ${MISTRAL_API_KEY}

state_schema:
  topic:
    type: string
  raw_data:
    type: object
  analysis:
    type: object
  summary:
    type: string

graph:
  nodes:
    - name: researcher_agent
      type: subgraph
      config:
        path: agents/researcher.yaml

    - name: analyst_agent
      type: subgraph
      config:
        path: agents/analyst.yaml

    - name: summarizer_agent
      type: subgraph
      config:
        path: agents/summarizer.yaml

    - name: dynamic_coordinator
      type: supervisor
      config:
        strategy: dynamic
        children: [researcher_agent, analyst_agent, summarizer_agent]
        goal: "Research the topic, analyse the data, then generate a summary report"
        selector_prompt: |
          You are an orchestrator managing research agents.
          You will be told which outputs are "Completed" and which are "Missing".
          Your job is to call agents that produce the MISSING outputs.

          Available agents and what they produce:
          - researcher_agent: produces 'raw_data' (no dependencies)
          - analyst_agent: produces 'analysis' (needs 'raw_data' to be completed first)
          - summarizer_agent: produces 'summary' (needs 'analysis' to be completed first)

          Rules:
          - If there are MISSING outputs, you MUST return the agent(s) that produce them
          - Only call agents whose input dependencies are already in "Completed"
          - Return an empty array [] ONLY when there are NO missing outputs
          - Respond with ONLY a JSON array of agent names, nothing else
        required_outputs: [raw_data, analysis, summary]
        output_owners:
          raw_data: researcher_agent
          analysis: analyst_agent
          summary: summarizer_agent
        max_iterations: 6
        collect_stats: true

  edges:
    - from: START
      to: dynamic_coordinator
    - from: dynamic_coordinator
      to: END
